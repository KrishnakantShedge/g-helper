name: Release

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v7
    - name: Setup dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Check tag matches version
      if: github.event_name == 'release'
      run: |
        $version = ([xml](Get-Content app/GHelper.csproj)).Project.PropertyGroup.AssemblyVersion
        $tag = "${{ github.event.release.tag_name }}"
        if ($tag -ne "v$version") { throw "Tag $tag does not match AssemblyVersion $version" }

    - name: Publish
      run: |
        dotnet publish app/GHelper.sln --configuration Release --runtime win-x64 -p:PublishSingleFile=true --no-self-contained

    - name: Upload unsigned EXE
      id: upload-unsigned
      uses: actions/upload-artifact@v7
      with:
        path: app/bin/x64/Release/net8.0-windows/win-x64/publish/GHelper.exe